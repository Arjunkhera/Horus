id: task
name: Task
description: "An actionable work item with status tracking"
icon: "checkbox"
fields:
  status:
    type: enum
    values: [open, in-progress, blocked, done, archived, cancelled]
    default: open
    required: true
    search_mode: term
  priority:
    type: enum
    values: [P0-critical, P1-high, P2-medium, P3-low]
    default: P2-medium
    required: false
    search_mode: term
  due:
    type: date
    required: false
    search_mode: term
  effort:
    type: number
    min: 1
    max: 21
    integer: true
    required: false
    search_mode: none
  assignee:
    type: reference
    ref_type: person
    required: false
    search_mode: term
  project:
    type: reference
    ref_type: project
    required: false
    search_mode: term
template:
  frontmatter:
    status: open
    priority: P2-medium
    tags: []
  body: |
    ## Context

    ## Acceptance Criteria

    - [ ]

    ## Notes
