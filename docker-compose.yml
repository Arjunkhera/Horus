# ─────────────────────────────────────────────────────────────────────────────
# Horus — Unified Docker Compose (Remote-First)
# Boots Anvil (8100), Vault (8000), and Forge (8200) as a single stack.
# Clones repositories into HORUS_DATA_PATH on first boot.
#
# Usage:
#   docker-compose up --build
#   docker-compose down -v
#
# Prerequisites:
#   - Docker Desktop (or Docker Engine + Compose plugin)
#   - HORUS_DATA_PATH must be set (absolute path, no ~ expansion in Docker)
#   - GITHUB_TOKEN set if any repos are private (optional)
#
# Environment:
#   Copy .env.example to .env and edit, or export variables before running.
#   See .env.example for all available overrides.
#   HORUS_DATA_PATH is required — set before running docker-compose.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Anvil ──────────────────────────────────────────────────────────────────
  # Notes system and MCP server. Indexes markdown files from the Notes repo.
  anvil:
    build:
      context: packages/anvil
      dockerfile: Dockerfile
    ports:
      - "${ANVIL_PORT:-8100}:8100"
    volumes:
      # Notes repo — read/write so Anvil can git-sync or clone on first boot
      - ${HORUS_DATA_PATH}/notes:/data/notes:rw
    environment:
      - ANVIL_TRANSPORT=http
      - ANVIL_PORT=8100
      - ANVIL_HOST=0.0.0.0
      - ANVIL_NOTES_PATH=/data/notes
      - ANVIL_REPO_URL=${ANVIL_REPO_URL:-}
      - ANVIL_SYNC_INTERVAL=${ANVIL_SYNC_INTERVAL:-300}
      - ANVIL_DEBOUNCE_SECONDS=${ANVIL_DEBOUNCE_SECONDS:-5}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # Runtime detection — entrypoints use this to conditionally run chown/chmod
      # (needed for Podman user-namespace remapping, harmful on Docker Desktop macOS)
      - HORUS_RUNTIME=${HORUS_RUNTIME:-docker}
    networks:
      - horus-net
    restart: unless-stopped
    stop_grace_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  # ── Vault ──────────────────────────────────────────────────────────────────
  # Knowledge service. Search over the knowledge-base repo.
  vault:
    build:
      context: services/vault
      dockerfile: Dockerfile
    ports:
      - "${VAULT_PORT:-8000}:8000"
    volumes:
      # Knowledge-base repo — read/write; Vault clones on first boot if empty
      - ${HORUS_DATA_PATH}/knowledge-base:/data/knowledge-repo:rw
      # Write-path workspace: staging area for draft pages before PR
      - vault-workspace:/data/workspace
    environment:
      - KNOWLEDGE_REPO_PATH=/data/knowledge-repo
      - WORKSPACE_PATH=/data/workspace
      - VAULT_KNOWLEDGE_REPO_URL=${VAULT_KNOWLEDGE_REPO_URL:-}
      - SYNC_INTERVAL=${VAULT_SYNC_INTERVAL:-300}
      - VAULT_SYNC_INTERVAL=${VAULT_SYNC_INTERVAL:-300}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - HOST=0.0.0.0
      - PORT=8000
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - HORUS_RUNTIME=${HORUS_RUNTIME:-docker}
    networks:
      - horus-net
    restart: unless-stopped
    stop_grace_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Vault Router ───────────────────────────────────────────────────────────
  # Routes MCP tool calls to N vault instances: fan-out reads, UUID-routed writes.
  # Single vault in dev → effectively passes through to vault.
  vault-router:
    build:
      context: services/vault-router
      dockerfile: Dockerfile
    ports:
      - "${VAULT_ROUTER_PORT:-8050}:8400"
    environment:
      - VAULT_ENDPOINTS=default=http://vault:8000
      - VAULT_DEFAULT=default
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - horus-net
    restart: unless-stopped
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8400/health')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── Vault MCP ──────────────────────────────────────────────────────────────
  # Thin MCP adapter that translates MCP tool calls to Vault REST API calls.
  # Claude Desktop connects to this service (port 8300) via the `url` config.
  # Depends on vault-router being healthy before starting.
  vault-mcp:
    build:
      context: packages/vault-mcp
      dockerfile: Dockerfile
    ports:
      - "${VAULT_MCP_PORT:-8300}:8300"
    environment:
      - VAULT_MCP_HTTP=true
      - VAULT_MCP_PORT=8300
      - VAULT_MCP_HOST=0.0.0.0
      # Points at vault-router (matches production; router passes through to vault in single-vault dev)
      - KNOWLEDGE_SERVICE_URL=http://vault-router:8400
    depends_on:
      vault-router:
        condition: service_healthy
    networks:
      - horus-net
    restart: unless-stopped
    stop_grace_period: 15s
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8300/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ── Forge ──────────────────────────────────────────────────────────────────
  # Workspace manager and package registry MCP server.
  # Waits for Anvil and Vault to be healthy before starting — its entrypoint
  # writes HORUS_DATA_PATH/config/forge.yaml with the Anvil and Vault endpoint URLs.
  forge:
    build:
      context: packages/forge
      dockerfile: Dockerfile
    ports:
      - "${FORGE_PORT:-8200}:8200"
    volumes:
      # Forge config: repos.json, workspaces.json, forge.yaml — persists across restarts
      - ${HORUS_DATA_PATH}/config:/data/config:rw
      # Forge Registry — read/write; Forge clones on first boot if empty
      - ${HORUS_DATA_PATH}/registry:/data/registry:rw
      # Workspaces: Forge creates workspace directories here
      - ${HORUS_DATA_PATH}/workspaces:/data/workspaces:rw
      # Managed clone pool: reference clones created by forge_repo_clone
      - ${HORUS_DATA_PATH}/repos:/data/horus-repos:rw
      # Active sessions / worktrees
      - ${HORUS_DATA_PATH}/sessions:/data/sessions:rw
      # Test environment slots
      - ${HORUS_DATA_PATH}/test-env:/data/test-env:rw
      # Local repos — read-only; lets Forge scan host repos for the index
      - ${HOST_REPOS_PATH}:/data/repos:ro
    environment:
      - FORGE_PORT=8200
      - FORGE_HOST=0.0.0.0
      - FORGE_REGISTRY_PATH=/data/registry
      - FORGE_WORKSPACES_PATH=/data/workspaces
      # Config directory: forge.yaml, repos.json, workspaces.json
      - FORGE_CONFIG_PATH=/data/config
      - FORGE_REGISTRY_REPO_URL=${FORGE_REGISTRY_REPO_URL:-}
      - FORGE_SYNC_INTERVAL=${FORGE_SYNC_INTERVAL:-300}
      # These are the Docker-internal service URLs — Forge writes them into
      # HORUS_DATA_PATH/config/forge.yaml and into every workspace's MCP config it creates
      - FORGE_ANVIL_URL=http://anvil:8100
      - FORGE_VAULT_URL=http://vault-mcp:8300
      # Host-facing URLs and paths — used when emitting .claude/settings.local.json
      # into each workspace so Claude Code on the host can connect to MCP servers
      # and resolve the wrapper script path without Docker network names.
      - FORGE_HOST_WORKSPACES_PATH=${HORUS_DATA_PATH}/workspaces
      - FORGE_HOST_REPOS_PATH=${HOST_REPOS_PATH}
      - FORGE_HOST_ANVIL_URL=http://localhost:${ANVIL_PORT:-8100}
      - FORGE_HOST_VAULT_URL=http://localhost:${VAULT_MCP_PORT:-8300}
      - FORGE_HOST_FORGE_URL=http://localhost:${FORGE_PORT:-8200}
      # Colon-separated list of in-container paths to scan for git repos.
      # Generated by the CLI from host_repos_extra_scan_dirs config — do not edit manually.
      - FORGE_SCAN_PATHS=${FORGE_SCAN_PATHS:-/data/repos}
      - FORGE_MANAGED_REPOS_PATH=/data/horus-repos
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - HORUS_RUNTIME=${HORUS_RUNTIME:-docker}
    depends_on:
      anvil:
        condition: service_healthy
      vault:
        condition: service_healthy
    networks:
      - horus-net
    restart: unless-stopped
    stop_grace_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3


  # ── Typesense ─────────────────────────────────────────────────────────────
  # Full-text and vector search engine for unified Horus Search.
  typesense:
    image: typesense/typesense:27.1
    ports:
      - "${TYPESENSE_PORT:-8108}:8108"
    volumes:
      - ${HORUS_DATA_PATH:-~/.horus}/typesense-data:/data
    command: >
      --data-dir=/data
      --api-key=${TYPESENSE_API_KEY:-horus-local-key}
      --enable-cors
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8108'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ── Horus UI ─────────────────────────────────────────────────────────────
  # React + Vite SPA served through an Express proxy on port 8400.
  # ui-server proxies /api/* to Anvil, Vault-MCP, and Forge;
  # serves static assets built from @horus/ui-client.
  horus-ui:
    build:
      context: .
      dockerfile: packages/ui-server/Dockerfile
    ports:
      - "${UI_PORT:-8400}:8400"
    environment:
      - PORT=8400
      - ANVIL_URL=http://anvil:8100
      - VAULT_URL=http://vault-mcp:8300
      - FORGE_URL=http://forge:8200
      - NODE_ENV=production
    depends_on:
      anvil:
        condition: service_healthy
      vault-mcp:
        condition: service_healthy
      forge:
        condition: service_healthy
    networks:
      - horus-net
    restart: unless-stopped
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8400/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  horus-net:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  # Vault write-path staging workspace
  vault-workspace:
