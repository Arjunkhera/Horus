# ─────────────────────────────────────────────────────────────────────────────
# Horus — Unified Docker Compose (Remote-First)
# Boots Anvil (8100), Vault (8000), and Forge (8200) as a single stack.
# Clones repositories into HORUS_DATA_PATH on first boot.
#
# Usage:
#   docker-compose up --build
#   docker-compose down -v
#
# Prerequisites:
#   - Docker Desktop (or Docker Engine + Compose plugin)
#   - HORUS_DATA_PATH must be set (absolute path, no ~ expansion in Docker)
#   - GITHUB_TOKEN set if any repos are private (optional)
#
# Environment:
#   Copy .env.example to .env and edit, or export variables before running.
#   See .env.example for all available overrides.
#   HORUS_DATA_PATH is required — set before running docker-compose.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Anvil ──────────────────────────────────────────────────────────────────
  # Notes system and MCP server. Indexes markdown files from the Notes repo.
  anvil:
    build:
      context: ../Anvil
      dockerfile: Dockerfile
    ports:
      - "${ANVIL_PORT:-8100}:8100"
    volumes:
      # Notes repo — read/write so Anvil can git-sync or clone on first boot
      - ${HORUS_DATA_PATH}/notes:/data/notes:rw
      # QMD model + data cache — GGUF models (~1GB) downloaded on first use.
      # Persisting this avoids re-downloading models on every container rebuild.
      - anvil-qmd-models:/home/anvil/.cache/qmd
    environment:
      - ANVIL_TRANSPORT=http
      - ANVIL_PORT=8100
      - ANVIL_HOST=0.0.0.0
      - ANVIL_NOTES_PATH=/data/notes
      - ANVIL_REPO_URL=${ANVIL_REPO_URL:-}
      - ANVIL_QMD_COLLECTION=${ANVIL_QMD_COLLECTION:-anvil}
      - ANVIL_SYNC_INTERVAL=${ANVIL_SYNC_INTERVAL:-300}
      - ANVIL_DEBOUNCE_SECONDS=${ANVIL_DEBOUNCE_SECONDS:-5}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    networks:
      - horus-net
    restart: unless-stopped
    stop_grace_period: 15s
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  # ── Vault ──────────────────────────────────────────────────────────────────
  # Knowledge service. Semantic search over the knowledge-base repo.
  # Gets more memory headroom — QMD indexing causes spikes during startup.
  vault:
    build:
      context: ../Vault/knowledge-service
      dockerfile: Dockerfile
    ports:
      - "${VAULT_PORT:-8000}:8000"
    volumes:
      # Knowledge-base repo — read/write; Vault clones on first boot if empty
      - ${HORUS_DATA_PATH}/knowledge-base:/data/knowledge-repo:rw
      # Write-path workspace: staging area for draft pages before PR
      - vault-workspace:/data/workspace
    environment:
      - KNOWLEDGE_REPO_PATH=/data/knowledge-repo
      - WORKSPACE_PATH=/data/workspace
      - VAULT_KNOWLEDGE_REPO_URL=${VAULT_KNOWLEDGE_REPO_URL:-}
      - QMD_INDEX_NAME=${QMD_INDEX_NAME:-knowledge}
      - SYNC_INTERVAL=${VAULT_SYNC_INTERVAL:-300}
      - VAULT_SYNC_INTERVAL=${VAULT_SYNC_INTERVAL:-300}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - HOST=0.0.0.0
      - PORT=8000
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    networks:
      - horus-net
    restart: unless-stopped
    stop_grace_period: 15s
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── Vault MCP ──────────────────────────────────────────────────────────────
  # Thin MCP adapter that translates MCP tool calls to Vault REST API calls.
  # Claude Desktop connects to this service (port 8300) via the `url` config.
  # Depends on vault (the REST backend) being healthy before starting.
  vault-mcp:
    build:
      context: ../Vault/knowledge-mcp
      dockerfile: Dockerfile
    ports:
      - "${VAULT_MCP_PORT:-8300}:8300"
    environment:
      - VAULT_MCP_HTTP=true
      - VAULT_MCP_PORT=8300
      - VAULT_MCP_HOST=0.0.0.0
      # Points at the internal Docker network address of the vault service
      - KNOWLEDGE_SERVICE_URL=http://vault:8000
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - horus-net
    restart: unless-stopped
    stop_grace_period: 15s
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8300/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ── Forge ──────────────────────────────────────────────────────────────────
  # Workspace manager and package registry MCP server.
  # Waits for Anvil and Vault to be healthy before starting — its entrypoint
  # writes ~/.forge/config.yaml with the Anvil and Vault endpoint URLs.
  forge:
    build:
      context: ../Forge
      dockerfile: Dockerfile
    ports:
      - "${FORGE_PORT:-8200}:8200"
    volumes:
      # Forge Registry — read/write; Forge clones on first boot if empty
      - ${HORUS_DATA_PATH}/registry:/data/registry:rw
      # Workspaces: Forge creates workspace directories here
      - ${HORUS_DATA_PATH}/workspaces:/data/workspaces:rw
      # Local repos — read-only; lets Forge scan host repos for the index
      - ${HOST_REPOS_PATH}:/data/repos:ro
    environment:
      - FORGE_PORT=8200
      - FORGE_HOST=0.0.0.0
      - FORGE_REGISTRY_PATH=/data/registry
      - FORGE_WORKSPACES_PATH=/data/workspaces
      - FORGE_REGISTRY_REPO_URL=${FORGE_REGISTRY_REPO_URL:-}
      - FORGE_SYNC_INTERVAL=${FORGE_SYNC_INTERVAL:-300}
      # These are the Docker-internal service URLs — Forge writes them into
      # ~/.forge/config.yaml and into every workspace's MCP config it creates
      - FORGE_ANVIL_URL=http://anvil:8100
      - FORGE_VAULT_URL=http://vault-mcp:8300
      # Host-facing URLs and paths — used when emitting .claude/settings.local.json
      # into each workspace so Claude Code on the host can connect to MCP servers
      # and resolve the wrapper script path without Docker network names.
      - FORGE_HOST_WORKSPACES_PATH=${HORUS_DATA_PATH}/workspaces
      - FORGE_HOST_REPOS_PATH=${HOST_REPOS_PATH}
      - FORGE_HOST_ANVIL_URL=http://localhost:${ANVIL_PORT:-8100}
      - FORGE_HOST_VAULT_URL=http://localhost:${VAULT_MCP_PORT:-8300}
      - FORGE_HOST_FORGE_URL=http://localhost:${FORGE_PORT:-8200}
      # Colon-separated list of in-container paths to scan for git repos
      - FORGE_SCAN_PATHS=/data/repos
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    depends_on:
      anvil:
        condition: service_healthy
      vault:
        condition: service_healthy
    networks:
      - horus-net
    restart: unless-stopped
    stop_grace_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  horus-net:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  # Anvil QMD model cache — persists GGUF model downloads across rebuilds
  anvil-qmd-models:
  # Vault write-path staging workspace
  vault-workspace:
